<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orbitron Sciechem Limited">
  <defs>
    <!-- Top arc: clockwise from left → top → right -->
    <path id="tArc" d="M 48,250 A 202,202 0 0,1 452,250"/>
    <!-- Bottom arc: counter-clockwise from left → bottom → right -->
    <path id="bArc" d="M 24,250 A 226,226 0 0,0 476,250"/>
    <!-- Globe clip -->
    <clipPath id="gc"><circle cx="250" cy="262" r="112"/></clipPath>
  </defs>

  <!-- ── Badge background ── -->
  <circle cx="250" cy="250" r="248" fill="white"/>

  <!-- ── Outer border ring ── -->
  <circle cx="250" cy="250" r="242" fill="none" stroke="#1B3468" stroke-width="11"/>
  <!-- ── Inner decorative ring ── -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#1B3468" stroke-width="3"/>

  <!-- ── Orbit — BACK half (behind globe) ── -->
  <g transform="translate(250,262) rotate(-30)">
    <path d="M -153,0 A 153,58 0 0,0 153,0" fill="none" stroke="white"   stroke-width="18"/>
    <path d="M -153,0 A 153,58 0 0,0 153,0" fill="none" stroke="#1B3468" stroke-width="10"/>
  </g>

  <!-- ── Globe fill ── -->
  <circle cx="250" cy="262" r="112" fill="#2B75CC"/>

  <!-- ── Globe latitude lines (perspective ellipses) ── -->
  <g clip-path="url(#gc)" fill="none" stroke="#6AADEC" stroke-width="2.4">
    <ellipse cx="250" cy="262" rx="112" ry="29"/>
    <ellipse cx="250" cy="234" rx="110" ry="24"/>
    <ellipse cx="250" cy="290" rx="110" ry="24"/>
    <ellipse cx="250" cy="208" rx="98"  ry="17"/>
    <ellipse cx="250" cy="316" rx="98"  ry="17"/>
  </g>

  <!-- ── Globe longitude lines (ellipses clipped to sphere) ── -->
  <g clip-path="url(#gc)" fill="none" stroke="#6AADEC" stroke-width="2.4">
    <line x1="250" y1="150" x2="250" y2="374"/>
    <ellipse cx="250" cy="262" rx="56"  ry="112"/>
    <ellipse cx="250" cy="262" rx="94"  ry="112"/>
    <ellipse cx="250" cy="262" rx="28"  ry="112"/>
  </g>

  <!-- ── Globe border ── -->
  <circle cx="250" cy="262" r="112" fill="none" stroke="#1B3468" stroke-width="5"/>

  <!-- ── Orbit — FRONT half (over globe) ── -->
  <g transform="translate(250,262) rotate(-30)">
    <path d="M -153,0 A 153,58 0 0,1 153,0" fill="none" stroke="white"   stroke-width="18"/>
    <path d="M -153,0 A 153,58 0 0,1 153,0" fill="none" stroke="#1B3468" stroke-width="10"/>
    <!-- Satellite node -->
    <circle cx="153" cy="0" r="15" fill="#1B3468" stroke="white" stroke-width="5"/>
  </g>

  <!-- ── TOP TEXT: ORBITRON SCIECHEM ── -->
  <text fill="#1B3468"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="36"
        letter-spacing="5.5">
    <textPath href="#tArc" startOffset="50%" text-anchor="middle">ORBITRON SCIECHEM</textPath>
  </text>

  <!-- ── BOTTOM TEXT ── -->
  <text fill="#1B3468"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="14.5"
        letter-spacing="1.3">
    <textPath href="#bArc" startOffset="50%" text-anchor="middle">INDUSTRIAL CHEMICALS &amp; INGEDIENTS SUPPLIER</textPath>
  </text>
</svg>
