<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orbitron Sciechem Limited Logo">
  <defs>
    <path id="topArc"    d="M 9,100  A 91,91 0 1,1 191,100"/>
    <path id="bottomArc" d="M 14,100 A 86,86 0 0,0 186,100"/>
    <clipPath id="globeClip">
      <circle cx="100" cy="100" r="43"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <circle cx="100" cy="100" r="100" fill="white"/>

  <!-- Double outer ring -->
  <circle cx="100" cy="100" r="97"  fill="none" stroke="#003B7A" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="88"  fill="none" stroke="#003B7A" stroke-width="1.5"/>

  <!-- Top arc text: ORBITRON SCIECHEM -->
  <text font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="14.5" fill="#003B7A" letter-spacing="3.2">
    <textPath href="#topArc" startOffset="9%">ORBITRON SCIECHEM</textPath>
  </text>

  <!-- Bottom arc text -->
  <text font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="8.2" fill="#003B7A" letter-spacing="1.4">
    <textPath href="#bottomArc" startOffset="3.5%">INDUSTRIAL CHEMICALS &amp; INGREDIENTS SUPPLIER</textPath>
  </text>

  <!-- Globe fill -->
  <circle cx="100" cy="100" r="43" fill="#1a6dca"/>

  <!-- Globe grid lines (clipped) -->
  <g clip-path="url(#globeClip)" stroke="rgba(255,255,255,0.55)" stroke-width="0.7" fill="none">
    <!-- Latitude lines -->
    <line x1="57"  y1="100" x2="143" y2="100"/>
    <line x1="59"  y1="84"  x2="141" y2="84"/>
    <line x1="59"  y1="116" x2="141" y2="116"/>
    <line x1="66"  y1="70"  x2="134" y2="70"/>
    <line x1="66"  y1="130" x2="134" y2="130"/>
    <!-- Longitude ellipses -->
    <ellipse cx="100" cy="100" rx="10" ry="43"/>
    <ellipse cx="100" cy="100" rx="24" ry="43"/>
    <ellipse cx="100" cy="100" rx="36" ry="43"/>
  </g>

  <!-- Globe border -->
  <circle cx="100" cy="100" r="43" fill="none" stroke="#003B7A" stroke-width="2.5"/>

  <!-- Orbital ring – back portion (faded, behind globe) -->
  <g transform="rotate(-28 100 100)">
    <ellipse cx="100" cy="100" rx="62" ry="23" fill="none"
      stroke="#003B7A" stroke-width="3"
      stroke-dasharray="50 125" stroke-dashoffset="0" opacity="0.28"/>
  </g>

  <!-- Orbital ring – front portion (solid, in front of globe) -->
  <g transform="rotate(-28 100 100)">
    <ellipse cx="100" cy="100" rx="62" ry="23" fill="none"
      stroke="#003B7A" stroke-width="3.5"
      stroke-dasharray="125 50" stroke-dashoffset="-50"/>
  </g>

  <!-- Satellite dot on orbital ring (top-right) -->
  <circle cx="149" cy="72" r="7.5" fill="#003B7A"/>
</svg>
